<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Detection</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Code Detection</div>
        <h1>Java 代码检测平台</h1>
      </div>
      <div class="status" id="serviceStatus">API: checking...</div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>提交扫描</h2>
        <form id="scanForm" class="form">
          <label>
            项目名
            <input id="projectName" type="text" value="demo" required />
          </label>
          <label>
            代码目录
            <input id="sourceDirectory" type="text" placeholder="D:/demo-java-project" required />
          </label>
          <label>
            规则集
            <input id="ruleset" type="text" value="rulesets/java/quickstart.xml" />
          </label>
          <button type="submit">提交扫描</button>
        </form>
      </section>

      <section class="panel">
        <h2>任务列表</h2>
        <div id="taskList" class="list"></div>
      </section>

      <section class="panel full">
        <h2>任务详情</h2>
        <pre id="taskDetail" class="code">请选择一个任务。</pre>
      </section>

      <section class="panel full">
        <h2>检测结果</h2>
        <div id="findingCount" class="meta">0 items</div>
        <div id="findingList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
